  <style>

    body {

<body>

<div class="card">
  <img src="file_0000000042b861fd808de615ad3ddea5.png" alt="KuGuider" class="logo-img">
  <h2 id="title">Login</h2>

  <div class="input-group" id="nameContainer" style="display:none">
    <input type="text" id="name" placeholder="Full Name">
  </div>
  
  <div class="input-group">
    <input type="email" id="email" placeholder="Email Address">
  </div>

  <div class="input-group password">
    <input type="password" id="password" placeholder="Password">
    <i class="fa-solid fa-eye" id="toggle"></i>
  </div>

  <button id="action">Login</button>

  <button class="link" id="switch">
    Don't have an account? Signup
  </button>

  <button class="link" id="forgot">
    Forgot Password?
  </button>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// Theme Sync
const syncTheme = () => {
  const theme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
};
syncTheme();
window.addEventListener('storage', syncTheme);

// Firebase
firebase.initializeApp({
  apiKey:"AIzaSyBmbFYqpuqaWCxmh7VqKTb_8CUvyEohzbw",
  authDomain:"kuguider.firebaseapp.com",
  projectId:"kuguider"
});
const auth=firebase.auth();

const title=document.getElementById("title");
const nameI=document.getElementById("name");
const nameContainer=document.getElementById("nameContainer");
const email=document.getElementById("email");
const pass=document.getElementById("password");
const toggle=document.getElementById("toggle");
const action=document.getElementById("action");
const sw=document.getElementById("switch");
const toast=document.getElementById("toast");
const forgot=document.getElementById("forgot");

let isSignup = false;

function msg(t){
  toast.textContent=t;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 3000);
}

toggle.onclick=()=>{
  const type = pass.type === "password" ? "text" : "password";
  pass.type = type;
  toggle.className = type === "password" ? "fa-solid fa-eye" : "fa-solid fa-eye-slash";
};

sw.onclick=()=>{
  isSignup = !isSignup;
  title.textContent = isSignup ? "Signup" : "Login";
  action.textContent = isSignup ? "Signup" : "Login";
  nameContainer.style.display = isSignup ? "block" : "none";
  sw.textContent = isSignup ? "Already have an account? Login" : "Don't have an account? Signup";
  forgot.style.display = isSignup ? "none" : "block";
};

action.onclick=async()=>{
  if(!email.value || !pass.value) return msg("Please fill all fields");
  try{
    if(isSignup){
      if(!nameI.value) return msg("Please enter your name");
      const res = await auth.createUserWithEmailAndPassword(email.value, pass.value);
      await res.user.updateProfile({displayName: nameI.value});
    } else {
      await auth.signInWithEmailAndPassword(email.value, pass.value);
    }
    msg("Success! Redirecting...");
    setTimeout(()=>location.href="about.html", 1000);
  } catch(e) {
    msg(e.message);
  }
};

forgot.onclick=async()=>{
  if(!email.value) return msg("Please enter your email first");
  try {
    await auth.sendPasswordResetEmail(email.value);
    msg("Reset link sent to your email");
  } catch(e) {
    msg("Error: " + e.code);
  }
};

auth.onAuthStateChanged(user => { if(user) location.href="about.html"; });
</script>

</body>
